<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container card">

  <h2>🔐 Login / Signup</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="text" id="otp" placeholder="Enter OTP">

  <br>

  <button class="btn-success" onclick="signup()">Signup</button>
  <button class="btn-primary" onclick="login()">Login</button>
  <button class="btn-dark" onclick="confirmUser()">Confirm</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@latest/dist/amazon-cognito-identity.min.js"></script>
<script src="auth.js"></script>

</body>
</html>
